<!DOCTYPE html>
<html>
<head>
    <title>Letterly 💌</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&family=Quicksand&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="container">

    <h1>Letterly 💌</h1>

    <!-- EDITOR (hidden in shared view) -->
    <div id="editor">

        <form id="letterForm">

            <input id="name" type="text" placeholder="Enter name 💖">

            <select id="suggestion">
                <option value="">Pick a message (optional)</option>
                <option value="I miss you more than words can say ❤️">Miss you ❤️</option>
                <option value="You make my world brighter 💖">Cute 💖</option>
                <option value="I’m so lucky to have you 🌸">Grateful 🌸</option>
                <option value="No matter the distance, you’re always in my heart 💌">Long distance 💌</option>
            </select>

            <textarea id="message" placeholder="Write your message..."></textarea>

            <select id="theme">
                <option value="flower">Flower 🌸</option>
                <option value="romantic">Romantic 💖</option>
                <option value="aesthetic">Aesthetic 🌙</option>
            </select>

            <input id="ending" type="text" placeholder="Ending (e.g. Always yours 💌)">

            <button type="submit">Generate</button>

        </form>

        <div class="actions">
            <button id="downloadBtn">Download</button>
            <button id="shareBtn">Copy Link</button>
        </div>

    </div>

    <!-- CARD OUTPUT -->
    <div id="card"></div>

</div>

<script src="script.js"></script>
</body>
</html>
