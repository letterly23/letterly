<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Letterly 💌</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="container">

    <h1>Letterly 💌</h1>

    <!-- HOME -->
    <div id="home">

        <button onclick="showCard()">Create Card 💖</button>

        <button onclick="showLetter()">Write Letter 📜</button>

    </div>

    <!-- CARD EDITOR -->
    <div id="cardEditor" style="display:none;">

        <form id="letterForm">

            <input id="name" placeholder="Name">

            <select id="suggestion">
                <option value="">Pick message 💌</option>

                <option value="I miss you more than words can say ❤️">Miss you ❤️</option>

                <option value="Even miles apart, you’re always in my heart 💖">Long distance 💖</option>

                <option value="You make my world brighter ✨">Cute ✨</option>

                <option value="I’m lucky to have you 🌸">Grateful 🌸</option>
            </select>

            <textarea id="message" placeholder="Write message..."></textarea>

            <select id="theme">

                <option value="flower">Floral 🌸</option>

                <option value="romantic">Romantic ❤️</option>

                <option value="aesthetic">Aesthetic 💜</option>

                <option value="dark">Dark 🌙</option>

            </select>

            <input id="ending" placeholder="Ending">

            <button type="submit">Generate Card</button>

        </form>

    </div>

    <!-- LETTER -->
    <div id="letterEditor" style="display:none;">

        <div class="paper-editor">

            <p class="date" id="liveDate"></p>

            <p class="dear-text">Dear</p>

            <input id="letterName" placeholder="Name">

            <textarea id="letterText" maxlength="700"
                placeholder="Write your letter..."></textarea>

            <input id="letterEnding" placeholder="Always yours">

        </div>

        <button onclick="generateLetter()">Generate Letter</button>

    </div>

    <!-- OUTPUT -->
    <div id="card"></div>

    <!-- ACTIONS -->
    <div id="actions" style="display:none;">

        <button id="shareBtn">Copy Link 🔗</button>

        <button id="downloadBtn">Download 📥</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
